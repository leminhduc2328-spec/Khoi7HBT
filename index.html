<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Lớp Khối 7 - Trung Tâm Thăng Long</title>
    <link rel="icon" type="image/png" href="logo-tab.png">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Arial, sans-serif; 
        }
        
        body { 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #eef2f7;
            padding: 24px;
            overflow-x: hidden;
        }

        .container-wrapper {
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .brand-section {
            margin-bottom: 25px;
        }

        .brand-logo {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 50%;
            background: #eef2f7;
            padding: 6px;
            box-shadow: 
                6px 6px 12px #d1d9e6, 
                -6px -6px 12px #ffffff;
            transition: transform 0.3s ease;
        }

        .brand-logo:hover {
            transform: scale(1.05);
        }

        .brand-name {
            font-size: 18px;
            font-weight: 700;
            color: #2d3748;
            margin-top: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .branch-name {
            font-size: 13.5px;
            font-weight: 700;
            color: #718096;
            margin-top: 6px;
            letter-spacing: 0.6px;
            text-transform: uppercase;
        }

        .selection-card {
            background: #eef2f7;
            border-radius: 28px;
            padding: 35px 25px;
            box-shadow: 
                9px 9px 16px #d1d9e6, 
                -9px -9px 16px #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .section-title {
            font-size: 24px;
            font-weight: 800;
            color: #1a365d; 
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .section-subtitle {
            font-size: 13.5px;
            color: #718096;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .class-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 25px;
            max-height: 55vh; 
            overflow-y: auto;   
            padding: 10px 5px;
            scrollbar-width: thin;
        }

        .class-item-link {
            text-decoration: none;
            color: inherit;
            outline: none;
            opacity: 0;
            transform: translateY(25px);
            animation: slideUpFade 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes slideUpFade {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .class-box {
            width: 100%;
            padding: 18px 20px;
            background: #eef2f7;
            border-radius: 16px;
            font-size: 16.5px;
            font-weight: 600;
            color: #4a5568;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 
                5px 5px 10px #d1d9e6, 
                -5px -5px 10px #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .class-box:hover {
            color: #2b6cb0;
            background: #edf2f7;
            transform: translateY(-2px);
            box-shadow: 
                8px 8px 16px #c4cddb, 
                -8px -8px 16px #ffffff;
        }

        .class-box:active {
            transform: translateY(1px);
            box-shadow: 
                inset 4px 4px 8px #d1d9e6, 
                inset -4px -4px 8px #ffffff;
        }

        .class-icon {
            font-size: 14px;
            color: #718096;
            background: #eef2f7;
            width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            box-shadow: 
                3px 3px 6px #d1d9e6, 
                -3px -3px 6px #ffffff;
            transition: all 0.3s ease;
        }
        
        .class-box:hover .class-icon {
            color: #ffffff;
            background: #3182ce;
            box-shadow: 0 4px 10px rgba(49, 130, 206, 0.3);
            transform: translateX(3px);
        }

        .back-home-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
            color: #718096;
            text-decoration: none;
            font-size: 13.5px;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 12px;
            transition: all 0.2s ease;
        }
        
        .back-home-btn:hover {
            color: #1a365d;
            background: rgba(210, 218, 230, 0.4);
        }
    </style>
</head>
<body>

    <div class="container-wrapper">
        <div class="brand-section">
            <img src="logo-tab.png" alt="Logo Trung Tâm Thăng Long" class="brand-logo">
            <div class="brand-name">TRUNG TÂM THĂNG LONG</div>
            <div class="branch-name">CHI NHÁNH HAI BÀ TRƯNG</div>
        </div>

        <div class="selection-card">
            <h2 class="section-title">Danh sách lớp học</h2>
            <p class="section-subtitle">Phụ huynh vui lòng chọn chính xác lớp học của con</p>
            
            <div class="class-list">
                <a href="7c1b.html" class="class-item-link">
                    <div class="class-box">
                        <span>📚 Lớp Toán 7C1B</span>
                        <span class="class-icon">➜</span>
                    </div>
                </a>

                <a href="7c2b.html" class="class-item-link">
                    <div class="class-box">
                        <span>📚 Lớp Toán 7C2B</span>
                        <span class="class-icon">➜</span>
                    </div>
                </a>

                <a href="7c4b.html" class="class-item-link">
                    <div class="class-box">
                        <span>📚 Lớp Toán 7C4B</span>
                        <span class="class-icon">➜</span>
                    </div>
                </a>

                <a href="7s1b.html" class="class-item-link">
                    <div class="class-box">
                        <span>📚 Lớp Toán 7S1B</span>
                        <span class="class-icon">➜</span>
                    </div>
                </a>

                <a href="7s2b.html" class="class-item-link">
                    <div class="class-box">
                        <span>📚 Lớp Toán 7S2B</span>
                        <span class="class-icon">➜</span>
                    </div>
                </a>

                <a href="7t1b.html" class="class-item-link">
                    <div class="class-box">
                        <span>📚 Lớp Toán 7T1B</span>
                        <span class="class-icon">➜</span>
                    </div>
                </a>

                <a href="7t2b.html" class="class-item-link">
                    <div class="class-box">
                        <span>📚 Lớp Toán 7T2B</span>
                        <span class="class-icon">➜</span>
                    </div>
                </a>

                <a href="7t4b.html" class="class-item-link">
                    <div class="class-box">
                        <span>📚 Lớp Toán 7T4B</span>
                        <span class="class-icon">➜</span>
                    </div>
                </a>
            </div>
            
            <a href="index.html" class="back-home-btn">⬅ Quay lại Trang chủ chính</a>
        </div>
    </div>

    <script>
        
        document.querySelectorAll('.class-item-link').forEach((item, index) => {
            item.style.animationDelay = (index * 0.06) + 's';
        });
    </script>
</body>
</html>
